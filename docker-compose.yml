services:
  neo4j:
    image: neo4j:5.15
    container_name: mirofish-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-mirofish_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # 가속 이미지 (풀 속도가 느린 경우 위 주소를 교체)
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    depends_on:
      - neo4j
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  neo4j_data:
